<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Antrenman Takip</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --card: #1c1c1c;
    --accent: #e8ff47;
    --text: #f0f0f0;
    --muted: #666;
    --border: #2a2a2a;
    --done: #2a3a1a;
    --done-border: #6abf3a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    padding-bottom: 100px;
  }

  .header {
    padding: 52px 20px 20px;
    background: linear-gradient(180deg, #111 0%, var(--bg) 100%);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--border);
  }

  .header-top { display: flex; justify-content: space-between; align-items: flex-start; }

  .app-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px; letter-spacing: 2px; line-height: 1;
    color: var(--accent);
  }

  .week-badge {
    background: var(--accent); color: #000;
    font-size: 11px; font-weight: 600;
    padding: 4px 10px; border-radius: 20px; letter-spacing: 1px;
  }

  .date-text { color: var(--muted); font-size: 13px; margin-top: 4px; }

  .week-nav {
    display: flex; gap: 8px; margin-top: 16px;
    overflow-x: auto; scrollbar-width: none; padding-bottom: 4px;
  }
  .week-nav::-webkit-scrollbar { display: none; }

  .week-btn {
    flex-shrink: 0;
    background: var(--card); border: 1px solid var(--border);
    color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500;
    padding: 6px 14px; border-radius: 20px;
    cursor: pointer; transition: all 0.2s;
  }
  .week-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

  .day-tabs {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 8px; padding: 16px 20px;
  }

  .day-tab {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 6px;
    text-align: center; cursor: pointer; transition: all 0.2s;
  }
  .day-tab.active { background: var(--accent); border-color: var(--accent); }
  .day-tab.active .day-label, .day-tab.active .day-name { color: #000; }
  .day-tab.completed { border-color: var(--done-border); }

  .day-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .day-tab.active .day-label { color: #000; opacity: 0.6; }

  .day-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px; color: var(--text); margin-top: 2px;
  }

  .day-dot {
    width: 5px; height: 5px; border-radius: 50%;
    margin: 4px auto 0; background: transparent;
  }
  .day-tab.completed .day-dot { background: var(--done-border); }
  .day-tab.active .day-dot { background: #000; opacity: 0.4; }

  .section-label {
    padding: 0 20px 8px;
    font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted);
  }

  .workout-header {
    padding: 0 20px 16px;
    display: flex; justify-content: space-between; align-items: flex-end;
  }

  .workout-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 1px; line-height: 1;
  }

  .workout-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .progress-ring { position: relative; width: 52px; height: 52px; }
  .progress-ring svg { transform: rotate(-90deg); }
  .progress-ring-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: var(--accent);
  }

  .exercises { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }

  .exercise-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden; transition: all 0.3s;
  }
  .exercise-card.done { background: var(--done); border-color: var(--done-border); }

  .exercise-header {
    display: flex; align-items: center;
    padding: 14px 16px; gap: 12px; user-select: none;
  }

  .ex-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; color: var(--muted); min-width: 28px; line-height: 1;
  }
  .exercise-card.done .ex-number { color: var(--done-border); }

  .ex-info { flex: 1; cursor: pointer; }
  .ex-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .exercise-card.done .ex-name { color: #a8e06a; }
  .ex-sets { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .ex-actions { display: flex; gap: 8px; align-items: center; }

  .gif-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid var(--accent); background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--accent);
    transition: all 0.2s; flex-shrink: 0;
  }
  .gif-btn:active { transform: scale(0.9); background: var(--accent); color: #000; }

  .check-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid var(--border); background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .check-btn:active { transform: scale(0.9); }
  .exercise-card.done .check-btn { background: var(--done-border); border-color: var(--done-border); }
  .check-icon { font-size: 16px; }

  .set-log {
    display: none; padding: 0 16px 14px;
    border-top: 1px solid var(--border);
  }
  .exercise-card.expanded .set-log { display: block; }
  .exercise-card.done .set-log { border-color: rgba(106,191,58,0.2); }

  .set-log-title {
    font-size: 11px; letter-spacing: 1px; color: var(--muted);
    text-transform: uppercase; margin-bottom: 10px; margin-top: 12px;
  }

  .set-rows { display: flex; flex-direction: column; gap: 8px; }

  .set-row {
    display: grid; grid-template-columns: 28px 1fr 1fr;
    gap: 8px; align-items: center;
  }

  .set-num { font-size: 12px; color: var(--muted); font-weight: 500; }

  .set-input {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    text-align: center; width: 100%; -webkit-appearance: none;
  }
  .set-input:focus { outline: none; border-color: var(--accent); }
  .set-input::placeholder { color: var(--muted); font-size: 11px; }

  .complete-btn {
    margin: 20px 20px 0; width: calc(100% - 40px);
    background: var(--accent); color: #000; border: none;
    border-radius: 14px; padding: 16px;
    font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px;
    cursor: pointer; transition: all 0.2s;
  }
  .complete-btn:active { transform: scale(0.98); opacity: 0.9; }
  .complete-btn.all-done { background: var(--done-border); }

  .stats-bar {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; padding: 0 20px 16px;
  }

  .stat-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px; text-align: center;
  }

  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px; color: var(--accent); line-height: 1;
  }

  .stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--done-border); color: #000;
    font-weight: 600; font-size: 14px;
    padding: 12px 24px; border-radius: 30px;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .rest-day { padding: 40px 20px; text-align: center; }
  .rest-icon { font-size: 64px; margin-bottom: 16px; }
  .rest-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; color: var(--muted); letter-spacing: 2px;
  }
  .rest-sub { font-size: 14px; color: var(--muted); margin-top: 8px; }

  .divider { height: 1px; background: var(--border); margin: 8px 20px 16px; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.88); z-index: 500;
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card); border-radius: 24px 24px 0 0;
    width: 100%; max-width: 430px;
    padding: 0 0 48px;
    animation: slideUp 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 40px; height: 4px; background: var(--border);
    border-radius: 2px; margin: 12px auto 0;
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px; letter-spacing: 1px;
    padding: 16px 20px 2px; color: var(--accent);
  }

  .modal-meta { font-size: 13px; color: var(--muted); padding: 0 20px 14px; }

  .modal-gif-wrap {
    width: 100%; background: #111;
    display: flex; align-items: center; justify-content: center;
    min-height: 200px; position: relative;
  }

  .modal-gif {
    width: 100%; max-height: 260px;
    object-fit: cover; display: block;
  }

  .gif-loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 13px;
  }

  .modal-tip {
    margin: 14px 20px 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px;
    font-size: 13px; line-height: 1.6; color: #ccc;
  }

  .modal-tip-title {
    font-size: 11px; letter-spacing: 1px;
    text-transform: uppercase; color: var(--accent);
    font-weight: 600; margin-bottom: 6px;
  }

  .modal-close {
    margin: 14px 20px 0; width: calc(100% - 40px);
    background: var(--border); color: var(--text); border: none;
    border-radius: 12px; padding: 14px;
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="app-title">ANTRENMAN</div>
      <div class="date-text" id="dateText"></div>
    </div>
    <div class="week-badge" id="weekBadge">HAFTA 1</div>
  </div>
  <div class="week-nav" id="weekNav"></div>
</div>

<div style="height:12px;"></div>
<div class="stats-bar" id="statsBar"></div>
<div class="day-tabs" id="dayTabs"></div>
<div class="divider"></div>
<div id="workoutContent"></div>
<div class="toast" id="toast">✓ Antrenman tamamlandı!</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-gif-wrap">
      <div class="gif-loading" id="gifLoading">Yükleniyor...</div>
      <img class="modal-gif" id="modalGif" src="" alt="" style="display:none;"
        onload="document.getElementById('gifLoading').style.display='none'; this.style.display='block';"
        onerror="document.getElementById('gifLoading').textContent='Görsel yüklenemedi';">
    </div>
    <div class="modal-tip">
      <div class="modal-tip-title">💡 Teknik İpucu</div>
      <div id="modalTip"></div>
    </div>
    <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open'); const v=document.getElementById('modalVideo'); if(v){v.pause();v.src='';}">Kapat</button>
  </div>
</div>

      { name: "Lat Pulldown", sets: 3, reps: "10" },
      { name: "Cable Row (tek kol)", sets: 3, reps: "10" },
      { name: "Face Pull", sets: 3, reps: "15" },
      { name: "Bicep Curl (bar)", sets: 3, reps: "12" },
      { name: "Hammer Curl", sets: 3, reps: "12" }
    ]
  },
  5: {
    name: "LOWER B", sub: "Posterior Chain",
    exercises: [
      { name: "Romanian Deadlift", sets: 4, reps: "8" },
      { name: "Bulgarian Split Squat", sets: 3, reps: "10/taraf" },
      { name: "Leg Curl", sets: 3, reps: "12" },
      { name: "Hip Thrust", sets: 3, reps: "12" },
      { name: "Leg Extension", sets: 3, reps: "12" },
      { name: "Calf Raise", sets: 4, reps: "15" }
    ]
  },
  6: null,
  7: null
};

const DAY_LABELS = { 1: "Gün 1", 2: "Gün 2", 3: "Gün 3", 4: "Gün 4", 5: "Gün 5", 6: "Gün 6", 7: "Gün 7" };

let state = JSON.parse(localStorage.getItem('antrenman_v3') || 'null') || {
  currentWeek: 1, currentDay: 1, weeks: {}
};

function save() { localStorage.setItem('antrenman_v3', JSON.stringify(state)); }

function getWeekData(w) {
  if (!state.weeks[w]) state.weeks[w] = {};
  return state.weeks[w];
}

function getDayData(w, d) {
  const wd = getWeekData(w);
  if (!wd[d]) wd[d] = { completed: false, exercises: {} };
  return wd[d];
}

function getExData(w, d, i) {
  const dd = getDayData(w, d);
  if (!dd.exercises[i]) dd.exercises[i] = { done: false, sets: {} };
  return dd.exercises[i];
}

function initDate() {
  const now = new Date();
  const days = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
  const months = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  document.getElementById('dateText').textContent = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;
}

function renderWeekNav() {
  const nav = document.getElementById('weekNav');
  nav.innerHTML = '';
  for (let w = 1; w <= 16; w++) {
    const btn = document.createElement('button');
    btn.className = 'week-btn' + (w === state.currentWeek ? ' active' : '');
    btn.textContent = `H${w}`;
    btn.onclick = () => { state.currentWeek = w; save(); render(); };
    nav.appendChild(btn);
  }
  document.getElementById('weekBadge').textContent = `HAFTA ${state.currentWeek}`;
}

function renderStats() {
  const wd = getWeekData(state.currentWeek);
  let totalSets = 0;
  for (let d = 1; d <= 7; d++) {
    if (wd[d]?.exercises) {
      Object.values(wd[d].exercises).forEach(ex => {
        Object.values(ex.sets || {}).forEach(s => { if (s.weight) totalSets++; });
      });
    }
  }
  const workoutDays = [1,2,4,5].filter(d => wd[d]?.completed).length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-box"><div class="stat-val">${workoutDays}/4</div><div class="stat-label">Bu Hafta</div></div>
    <div class="stat-box"><div class="stat-val">${state.currentWeek}</div><div class="stat-label">Hafta</div></div>
    <div class="stat-box"><div class="stat-val">${totalSets}</div><div class="stat-label">Set Log</div></div>
  `;
}

function renderDayTabs() {
  const tabs = document.getElementById('dayTabs');
  tabs.innerHTML = '';
  const wd = getWeekData(state.currentWeek);
  for (let d = 1; d <= 7; d++) {
    const tab = document.createElement('div');
    const isActive = d === state.currentDay;
    const isDone = wd[d]?.completed;
    tab.className = 'day-tab' + (isActive ? ' active' : '') + (isDone ? ' completed' : '');
    const prog = PROGRAM[d];
    tab.innerHTML = `
      <div class="day-label">${DAY_LABELS[d]}</div>
      <div class="day-name">${prog ? prog.name.split(' ')[0] : (d===6?'AKTİF':'DİN')}</div>
      <div class="day-dot"></div>
    `;
    tab.onclick = () => { state.currentDay = d; save(); renderWorkout(); renderDayTabs(); };
    tabs.appendChild(tab);
  }
}

function openModal(name, meta) {
  const data = EXERCISES[name] || {};
  const videoUrl = EXERCISE_VIDEOS[name] || '';
  document.getElementById('modalTitle').textContent = name;
  document.getElementById('modalMeta').textContent = meta;
  document.getElementById('modalTip').textContent = data.tip || 'Hareketi kontrollü ve tam aralıkta yap.';
  const img = document.getElementById('modalGif');
  const loading = document.getElementById('gifLoading');

  let video = document.getElementById('modalVideo');
  if (!video) {
    video = document.createElement('video');
    video.id = 'modalVideo';
    video.autoplay = true;
    video.loop = true;
    video.muted = true;
    video.playsInline = true;
    video.style.cssText = 'width:100%;max-height:320px;object-fit:cover;background:#000;display:block;';
    img.parentNode.insertBefore(video, img);
  }

  if (videoUrl) {
    img.style.display = 'none';
    loading.style.display = 'none';
    video.style.display = 'block';
    video.src = videoUrl;
    video.load();
    video.play().catch(() => {});
  } else {
    video.style.display = 'none';
    img.style.display = 'none';
    loading.style.display = 'flex';
    loading.textContent = 'Video bulunamadı.';
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
    const video = document.getElementById('modalVideo');
    if (video) { video.pause(); video.src = ''; }
  }
}

function renderWorkout() {
  const content = document.getElementById('workoutContent');
  const day = state.currentDay;
  const prog = PROGRAM[day];
  const week = state.currentWeek;

  if (!prog) {
    const msgs = {
      3: ['🧘', 'DİNLENME', 'Bugün kaslarını dinlendir.'],
      6: ['🚴', 'AKTİF DİNLENME', '30-45 dk yürüyüş veya bisiklet.'],
      7: ['😴', 'TAM DİNLENME', 'Salon kapalı. Uyu, ye, iyi hisset.']
    };
    const m = msgs[day] || ['🏖️', 'DİNLENME', ''];
    content.innerHTML = `
      <div class="rest-day">
        <div class="rest-icon">${m[0]}</div>
        <div class="rest-title">${m[1]}</div>
        <div class="rest-sub">${m[2]}</div>
      </div>
    `;
    return;
  }

  const dayData = getDayData(week, day);
  const totalEx = prog.exercises.length;
  const doneEx = Object.values(dayData.exercises).filter(e => e.done).length;
  const circumference = 2 * Math.PI * 20;
  const offset = circumference - ((doneEx / totalEx) * circumference);

  content.innerHTML = `
    <div class="workout-header">
      <div>
        <div class="workout-title">${prog.name}</div>
        <div class="workout-sub">${prog.sub} · ${totalEx} egzersiz</div>
      </div>
      <div class="progress-ring">
        <svg width="52" height="52" viewBox="0 0 52 52">
          <circle cx="26" cy="26" r="20" fill="none" stroke="#2a2a2a" stroke-width="3"/>
          <circle cx="26" cy="26" r="20" fill="none" stroke="#e8ff47" stroke-width="3"
            stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"
            stroke-linecap="round" style="transition:stroke-dashoffset 0.4s"/>
        </svg>
        <div class="progress-ring-text">${doneEx}/${totalEx}</div>
      </div>
    </div>
    <div class="section-label">EGZERSİZLER</div>
    <div class="exercises" id="exList"></div>
    <button class="complete-btn ${dayData.completed ? 'all-done' : ''}" onclick="completeDay()">
      ${dayData.completed ? '✓ TAMAMLANDI' : 'ANTRENMAN BİTTİ'}
    </button>
    <div style="height:20px;"></div>
  `;

  const exList = document.getElementById('exList');
  prog.exercises.forEach((ex, i) => {
    const exData = getExData(week, day, i);
    const card = document.createElement('div');
    card.className = 'exercise-card' + (exData.done ? ' done' : '');
    card.id = `ex-${i}`;

    let setsHtml = '';
    for (let s = 0; s < ex.sets; s++) {
      const setData = exData.sets[s] || {};
      setsHtml += `
        <div class="set-row">
          <div class="set-num">S${s+1}</div>
          <input class="set-input" type="number" inputmode="decimal" placeholder="kg"
            value="${setData.weight || ''}"
            onchange="logSet(${i}, ${s}, 'weight', this.value)">
          <input class="set-input" type="number" inputmode="numeric" placeholder="${ex.reps} tekrar"
            value="${setData.reps || ''}"
            onchange="logSet(${i}, ${s}, 'reps', this.value)">
        </div>
      `;
    }

    const safeName = ex.name.replace(/'/g, "\\'");
    const safeMeta = `${ex.sets} set · ${ex.reps} tekrar`;

    card.innerHTML = `
      <div class="exercise-header">
        <div class="ex-number">${String(i+1).padStart(2,'0')}</div>
        <div class="ex-info" onclick="toggleExpand(${i})">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-sets">${ex.sets} set · ${ex.reps} tekrar</div>
        </div>
        <div class="ex-actions">
          <button class="gif-btn" onclick="openModal('${safeName}', '${safeMeta}')">▶</button>
          <button class="check-btn" onclick="toggleEx(${i})">
            <span class="check-icon">${exData.done ? '✓' : ''}</span>
          </button>
        </div>
      </div>
      <div class="set-log">
        <div class="set-log-title">Set Kayıt</div>
        <div class="set-rows">${setsHtml}</div>
      </div>
    `;
    exList.appendChild(card);
  });
}

function toggleExpand(i) {
  document.getElementById(`ex-${i}`).classList.toggle('expanded');
}

function toggleEx(i) {
  const exData = getExData(state.currentWeek, state.currentDay, i);
  exData.done = !exData.done;
  save();
  renderWorkout();
}

function logSet(exIdx, setIdx, field, value) {
  const exData = getExData(state.currentWeek, state.currentDay, exIdx);
  if (!exData.sets[setIdx]) exData.sets[setIdx] = {};
  exData.sets[setIdx][field] = value;
  save();
  renderStats();
}

function completeDay() {
  const dd = getDayData(state.currentWeek, state.currentDay);
  dd.completed = !dd.completed;
  save();
  if (dd.completed) showToast();
  render();
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function render() {
  renderWeekNav();
  renderStats();
  renderDayTabs();
  renderWorkout();
}

initDate();
render();
</script>
</body>
</html>
